<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1320" viewBox="0 0 1900 1320" role="img" aria-labelledby="title desc">
  <title id="title">One Man Vekery DFD Level 1 Clean</title>
  <desc id="desc">Clean level 1 data flow diagram for One Man Vekery with external entities, five processes, and five data stores.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f3f3f"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .entity { fill: #ffffff; stroke: #3f3f3f; stroke-width: 2.4; }
      .process { fill: #ffffff; stroke: #3f3f3f; stroke-width: 2.4; }
      .process-head { fill: #e9e9e9; stroke: #3f3f3f; stroke-width: 2.4; }
      .store-line { stroke: #3f3f3f; stroke-width: 2.4; fill: none; }
      .flow { stroke: #3f3f3f; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .flow-bidir { stroke: #3f3f3f; stroke-width: 2.4; fill: none; marker-start: url(#arrow); marker-end: url(#arrow); }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #222; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #222; }
      .label-small { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #333; }
      .label-tiny {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        fill: #444;
        stroke: #ffffff;
        stroke-width: 7;
        stroke-linejoin: round;
        paint-order: stroke fill;
      }
      .process-id { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #444; }
      .store-id { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #444; }
      .center { text-anchor: middle; dominant-baseline: middle; }
      .left { text-anchor: start; dominant-baseline: middle; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1900" height="1320"/>
  <text class="title center" x="950" y="54">One Man Vekery - DFD Level 1</text>

  <!-- External entities -->
  <rect class="entity" x="60" y="135" width="170" height="78"/>
  <text class="label center" x="145" y="174">Guest</text>

  <rect class="entity" x="60" y="385" width="170" height="92"/>
  <text class="label center" x="145" y="418">Customer</text>
  <text class="label-small center" x="145" y="448">Member</text>

  <rect class="entity" x="60" y="1015" width="170" height="78"/>
  <text class="label center" x="145" y="1054">Staff</text>

  <rect class="entity" x="60" y="1140" width="170" height="92"/>
  <text class="label center" x="145" y="1173">Admin / Owner</text>
  <text class="label-small center" x="145" y="1203">Higher Permission</text>

  <!-- Processes -->
  <rect class="process" x="420" y="115" rx="18" ry="18" width="370" height="120"/>
  <path class="process-head" d="M 420 153 a 18 18 0 0 1 18 -18 h 334 a 18 18 0 0 1 18 18 v 0 H 420 z"/>
  <line class="store-line" x1="420" y1="153" x2="790" y2="153"/>
  <text class="process-id center" x="605" y="134">1.0</text>
  <text class="label center" x="605" y="190">Account &amp; Profile</text>

  <rect class="process" x="420" y="300" rx="18" ry="18" width="370" height="120"/>
  <path class="process-head" d="M 420 338 a 18 18 0 0 1 18 -18 h 334 a 18 18 0 0 1 18 18 v 0 H 420 z"/>
  <line class="store-line" x1="420" y1="338" x2="790" y2="338"/>
  <text class="process-id center" x="605" y="319">2.0</text>
  <text class="label center" x="605" y="375">Catalog &amp; Cart</text>

  <rect class="process" x="420" y="485" rx="18" ry="18" width="370" height="120"/>
  <path class="process-head" d="M 420 523 a 18 18 0 0 1 18 -18 h 334 a 18 18 0 0 1 18 18 v 0 H 420 z"/>
  <line class="store-line" x1="420" y1="523" x2="790" y2="523"/>
  <text class="process-id center" x="605" y="504">3.0</text>
  <text class="label center" x="605" y="560">Checkout &amp; Orders</text>

  <rect class="process" x="420" y="855" rx="18" ry="18" width="370" height="120"/>
  <path class="process-head" d="M 420 893 a 18 18 0 0 1 18 -18 h 334 a 18 18 0 0 1 18 18 v 0 H 420 z"/>
  <line class="store-line" x1="420" y1="893" x2="790" y2="893"/>
  <text class="process-id center" x="605" y="874">5.0</text>
  <text class="label center" x="605" y="930">Contact Messages</text>

  <rect class="process" x="420" y="1045" rx="18" ry="18" width="370" height="120"/>
  <path class="process-head" d="M 420 1083 a 18 18 0 0 1 18 -18 h 334 a 18 18 0 0 1 18 18 v 0 H 420 z"/>
  <line class="store-line" x1="420" y1="1083" x2="790" y2="1083"/>
  <text class="process-id center" x="605" y="1064">4.0</text>
  <text class="label center" x="605" y="1120">BackOffice Operations</text>

  <!-- Data stores -->
  <path class="store-line" d="M 1120 115 H 1700 M 1120 195 H 1700 M 1120 115 V 195 M 1200 115 V 195"/>
  <text class="store-id center" x="1160" y="155">D1</text>
  <text class="label center" x="1450" y="145">Account Data</text>
  <text class="label-small center" x="1450" y="174">(Users / Roles / Addresses)</text>

  <path class="store-line" d="M 1120 300 H 1700 M 1120 380 H 1700 M 1120 300 V 380 M 1200 300 V 380"/>
  <text class="store-id center" x="1160" y="340">D2</text>
  <text class="label center" x="1450" y="330">Catalog Data</text>
  <text class="label-small center" x="1450" y="359">(Products / Categories)</text>

  <path class="store-line" d="M 1120 485 H 1700 M 1120 565 H 1700 M 1120 485 V 565 M 1200 485 V 565"/>
  <text class="store-id center" x="1160" y="525">D3</text>
  <text class="label center" x="1450" y="515">Order Data</text>
  <text class="label-small center" x="1450" y="544">(Orders / OrderItems)</text>

  <path class="store-line" d="M 1120 670 H 1700 M 1120 750 H 1700 M 1120 670 V 750 M 1200 670 V 750"/>
  <text class="store-id center" x="1160" y="710">D4</text>
  <text class="label center" x="1450" y="700">Promotion / Loyalty Data</text>
  <text class="label-small center" x="1450" y="729">(Promotions / PromoCodes / Wallets)</text>

  <path class="store-line" d="M 1120 855 H 1700 M 1120 935 H 1700 M 1120 855 V 935 M 1200 855 V 935"/>
  <text class="store-id center" x="1160" y="895">D5</text>
  <text class="label center" x="1450" y="885">Contact Data</text>
  <text class="label-small center" x="1450" y="914">(ContactMessages)</text>

  <!-- External entity flows -->
  <path class="flow" d="M 230 155 H 420"/>
  <text class="label-tiny center" x="325" y="139">Register / Login Data</text>

  <path class="flow" d="M 420 190 H 230"/>
  <text class="label-tiny center" x="325" y="206">Auth Result</text>

  <path class="flow" d="M 230 410 H 360 V 345 H 420"/>
  <text class="label-tiny left" x="248" y="394">Browse / Search / Cart</text>

  <path class="flow" d="M 420 380 H 330 V 440 H 230"/>
  <text class="label-tiny left" x="248" y="456">Catalog / Cart Result</text>

  <path class="flow" d="M 230 435 H 335 V 535 H 420"/>
  <text class="label-tiny left" x="248" y="520">Checkout / Tracking Request</text>

  <path class="flow" d="M 420 575 H 355 V 465 H 230"/>
  <text class="label-tiny left" x="248" y="582">Order Result / Status</text>

  <path class="flow" d="M 230 465 H 315 V 915 H 420"/>
  <text class="label-tiny left" x="248" y="730">Contact Form Data</text>

  <path class="flow" d="M 420 950 H 295 V 455 H 230"/>
  <text class="label-tiny left" x="248" y="966">Contact Result</text>

  <path class="flow" d="M 230 1045 H 420"/>
  <text class="label-tiny center" x="325" y="1029">Daily Operation Request</text>

  <path class="flow" d="M 420 1080 H 230"/>
  <text class="label-tiny center" x="325" y="1096">Operation Result</text>

  <path class="flow" d="M 230 1165 H 420"/>
  <text class="label-tiny center" x="325" y="1149">Staff / Role Management</text>

  <path class="flow" d="M 420 1145 H 230"/>
  <text class="label-tiny center" x="325" y="1182">Dashboard / Staff Result</text>

  <!-- Process to data store flows -->
  <path class="flow-bidir" d="M 790 175 H 1120"/>
  <text class="label-tiny center" x="955" y="159">Account Data</text>

  <path class="flow-bidir" d="M 790 360 H 1120"/>
  <text class="label-tiny center" x="955" y="344">Catalog Data</text>

  <path class="flow-bidir" d="M 790 545 H 1120"/>
  <text class="label-tiny center" x="955" y="529">Order Data</text>

  <path class="flow" d="M 575 605 V 710 H 1120"/>
  <text class="label-tiny center" x="840" y="694">Promo / Point Rules to D4</text>

  <path class="flow" d="M 1120 735 H 645 V 605"/>
  <text class="label-tiny center" x="840" y="756">Promo / Point Result from D4</text>

  <path class="flow-bidir" d="M 790 915 H 1120"/>
  <text class="label-tiny center" x="955" y="899">Contact Data</text>

  <!-- Backoffice data management, routed outside the main flow area -->
  <path class="flow-bidir" d="M 790 1085 H 1760 V 155 H 1700"/>
  <text class="label-tiny left" x="810" y="1069">Manage Account Data</text>

  <path class="flow-bidir" d="M 790 1110 H 1780 V 340 H 1700"/>
  <text class="label-tiny left" x="810" y="1094">Manage Catalog Data</text>

  <path class="flow-bidir" d="M 790 1135 H 1800 V 525 H 1700"/>
  <text class="label-tiny left" x="810" y="1119">Manage Order Data</text>

  <path class="flow-bidir" d="M 790 1160 H 1820 V 710 H 1700"/>
  <text class="label-tiny left" x="810" y="1144">Manage Promo / Loyalty</text>

  <path class="flow-bidir" d="M 790 1185 H 1840 V 895 H 1700"/>
  <text class="label-tiny left" x="810" y="1169">Manage Contact Data</text>
</svg>
