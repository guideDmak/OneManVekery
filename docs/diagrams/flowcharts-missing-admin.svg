  <text class="title center" x="950" y="58">Additional Flowcharts</text>

  <!-- Left flowchart: Admin Manage Orders -->
  <text class="subtitle center" x="475" y="115">Admin Manage Orders</text>

  <rect class="terminal" x="390" y="145" rx="30" ry="30" width="170" height="54"/>
  <text class="label center" x="475" y="172">เริ่ม</text>

  <rect class="node" x="345" y="235" width="260" height="70"/>
  <text class="label center" x="475" y="270">เข้าสู่ระบบหลังบ้าน</text>

  <path class="decision" d="M 475 345 L 620 420 L 475 495 L 330 420 Z"/>
  <text class="label center" x="475" y="410">สิทธิ์ถูกต้อง</text>
  <text class="label center" x="475" y="435">หรือไม่</text>

  <rect class="node" x="660" y="385" width="250" height="70"/>
  <text class="label center" x="785" y="420">ปฏิเสธการเข้าใช้งาน</text>

  <rect class="node" x="345" y="540" width="260" height="70"/>
