<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1280" viewBox="0 0 1900 1280" role="img" aria-labelledby="title desc">
  <title id="title">Missing Admin Flowcharts</title>
  <desc id="desc">Additional flowcharts for One Man Vekery covering admin order management and account role management.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f2f2f2"/>
    </marker>
    <style>
      .bg { fill: #101010; }
      .grid-small { stroke: #2a2a2a; stroke-width: 1; }
      .grid-large { stroke: #3a3a3a; stroke-width: 1.4; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 40px; font-weight: 700; fill: #f5f5f5; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #f5f5f5; }
      .node { fill: #151515; stroke: #f2f2f2; stroke-width: 2.2; }
      .terminal { fill: #151515; stroke: #f2f2f2; stroke-width: 2.2; }
      .decision { fill: #151515; stroke: #f2f2f2; stroke-width: 2.2; }
      .flow { stroke: #f2f2f2; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 19px; fill: #f4f4f4; }
      .label-small { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #f4f4f4; }
      .edge-label { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #f4f4f4; stroke: #101010; stroke-width: 5; paint-order: stroke fill; }
      .center { text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect class="bg" x="-10" y="-10" width="1920" height="1300"/>

